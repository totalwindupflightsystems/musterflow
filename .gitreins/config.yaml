guards:
  secrets: true
  lint: false
  tests: false
  test_mode: full
  lsp: true
  lsp_servers:
    go:
    - gopls
  static_analysis: true
  static_analysis_tools: {}
  go:
    build: true
    lint: true
    tests: true
evaluator:
  max_iterations: 50
  max_time: 10m
  max_input_tokens: 0.5M
  max_output_tokens: 0.2M
  tool_call_weight: 0.1
  lsp_diagnostics: true
  static_analysis_diagnostics: true
defaults:
  model: glm-5.2
  check_for_updates: true
  update_check_ttl: 24h
history:
  enabled: true
  storage: git
  max_verdicts: 1000
